<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Konacore Gece Modu</title>
    <style>
        /* Genel Arkaplan Ayarları */
        body {
            margin: 0;
            padding: 0;
            background: radial-gradient(circle at center, #11111b 0%, #050505 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Inter', 'Segoe UI', sans-serif;
            overflow: hidden;
            color: white;
        }

        /* Kar Tanesi Tasarımı */
        .snow {
            position: fixed;
            top: -10px;
            background: white;
            border-radius: 50%;
            filter: blur(1px);
            z-index: 1;
            pointer-events: none;
            animation: fall linear forwards;
        }

        @keyframes fall {
            to {
                transform: translateY(105vh);
            }
        }

        /* KK Profile Buton Tasarımı */
        .kk-button {
            position: relative;
            z-index: 10;
            padding: 20px 50px;
            font-size: 1.5rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: white;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 12px;
            cursor: pointer;
            backdrop-filter: blur(15px);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            text-decoration: none;
        }

        .kk-button:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.5);
            transform: scale(1.1) translateY(-5px);
            box-shadow: 0 15px 45px rgba(255, 255, 255, 0.1);
        }

        .kk-button:active {
            transform: scale(0.95);
        }
    </style>
</head>
<body>

    <a href="#" class="kk-button">PROFILE</a>

    <script>
        function createSnowflake() {
            const snow = document.createElement('div');
            snow.classList.add('snow');
            
            const size = Math.random() * 4 + 1 + 'px';
            const startX = Math.random() * 100 + 'vw';
            const duration = Math.random() * 3 + 4 + 's';
            const delay = Math.random() * 2 + 's';

            snow.style.left = startX;
            snow.style.width = size;
            snow.style.height = size;
            snow.style.opacity = Math.random() * 0.7 + 0.3;
            snow.style.animationDuration = duration;
            
            document.body.appendChild(snow);

            setTimeout(() => {
                snow.remove();
            }, 7000);
        }

        // Kar yoğunluğunu buradan ayarlayabilirsin (150ms idealdir)
        setInterval(createSnowflake, 150);
    </script>
</body>
</html>
