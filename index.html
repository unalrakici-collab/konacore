<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Konacore - Market & Video</title>
    <style>
        /* Arkaplan ve Kar Atmosferi */
        body {
            margin: 0;
            padding: 0;
            background: radial-gradient(circle at center, #0f0f1a 0%, #050505 100%);
            height: 100vh;
            display: flex;
            flex-direction: column; /* Butonları alt alta veya yan yana dizmek için */
            justify-content: center;
            align-items: center;
            font-family: 'Poppins', sans-serif;
            overflow: hidden;
            color: white;
            gap: 20px; /* Butonlar arası boşluk */
        }

        .snow {
            position: fixed;
            top: -10px;
            background: white;
            border-radius: 50%;
            z-index: 1;
            pointer-events: none;
            animation: fall linear forwards;
        }

        @keyframes fall { to { transform: translateY(105vh); } }

        /* Ortak Buton Tasarımı */
        .kk-button {
            z-index: 10;
            padding: 18px 45px;
            font-size: 1.3rem;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: white;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 10px;
            cursor: pointer;
            backdrop-filter: blur(10px);
            transition: 0.3s;
            width: 280px; /* Butonların genişliği eşit olsun */
        }

        .kk-button:hover {
            background: rgba(255, 255, 255, 0.15);
            transform: scale(1.05);
            border-color: #00d4ff;
        }

        /* Overlay (Panel) Ayarları */
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            z-index: 100;
            display: none; /* JavaScript ile açılacak */
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(10px);
        }

        .content-box {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            width: 90%;
            max-width: 500px;
            border-radius: 20px;
            padding: 25px;
            text-align: center;
            position: relative;
        }

        /* Market Ürünleri */
        .item {
            background: rgba(255, 255, 255, 0.03);
            margin: 10px 0;
            padding: 15px;
            border-radius: 12px;
            display: flex;
            justify-content: space-between;
            border: 1px solid transparent;
        }
        .item-name { color: #00d4ff; font-weight: bold; }
        .item-price { color: #50ff7e; }

        /* Video Ayarları */
        video {
            width: 100%;
            border-radius: 10px;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }

        .close-btn {
            margin-top: 15px;
            background: none;
            border: 1px solid rgba(255,255,255,0.3);
            color: white;
            padding: 8px 20px;
            border-radius: 5px;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <button class="kk-button" onclick="toggle('market')">MARKET</button>
    <button class="kk-button" onclick="toggle('video')">VİDEO İZLE</button>

    <div class="overlay" id="marketOverlay">
        <div class="content-box">
            <h2>MARKET</h2>
            <div class="item"><span class="item-name">VIP</span><span class="item-price">25 TL</span></div>
            <div class="item"><span class="item-name">P.VIP</span><span class="item-price">35 TL</span></div>
            <button class="close-btn" onclick="toggle('market')">Kapat</button>
        </div>
    </div>

    <div class="overlay" id="videoOverlay">
        <div class="content-box">
            <h2>ÖZBEK ÇALIŞANLAR</h2>
            <video id="myVideo" controls>
                <source src="videoplayback.mp4" type="video/mp4">
                Tarayıcın video oynatmayı desteklemiyor.
            </video>
            <br>
            <button class="close-btn" onclick="toggle('video')">Kapat</button>
        </div>
    </div>

    <script>
        // Aç/Kapat Fonksiyonu
        function toggle(type) {
            const overlay = document.getElementById(type + 'Overlay');
            const video = document.getElementById('myVideo');
            
            if (overlay.style.display === 'flex') {
                overlay.style.display = 'none';
                if(type === 'video') video.pause(); // Kapatınca videoyu durdur
            } else {
                overlay.style.display = 'flex';
            }
        }

        // Kar Yağışı
        function createSnow() {
            const s = document.createElement('div');
            s.className = 'snow';
            s.style.left = Math.random() * 100 + 'vw';
            s.style.width = s.style.height = Math.random() * 4 + 2 + 'px';
            s.style.opacity = Math.random();
            s.style.animationDuration = Math.random() * 3 + 4 + 's';
            document.body.appendChild(s);
            setTimeout(() => s.remove(), 7000);
        }
        setInterval(createSnow, 100);
    </script>
</body>
</html>
