<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Konacore Market</title>
    <style>
        /* Arkaplan ve Kar Atmosferi */
        body {
            margin: 0;
            padding: 0;
            background: radial-gradient(circle at center, #0f0f1a 0%, #050505 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Poppins', sans-serif;
            overflow: hidden;
            color: white;
        }

        .snow {
            position: fixed;
            top: -10px;
            background: white;
            border-radius: 50%;
            z-index: 1;
            pointer-events: none;
            animation: fall linear forwards;
        }

        @keyframes fall { to { transform: translateY(105vh); } }

        /* Ana Buton */
        .kk-button {
            z-index: 10;
            padding: 18px 45px;
            font-size: 1.3rem;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: white;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 10px;
            cursor: pointer;
            backdrop-filter: blur(10px);
            transition: 0.3s;
        }

        .kk-button:hover {
            background: rgba(255, 255, 255, 0.15);
            transform: scale(1.05);
        }

        /* Market Paneli (Modal) */
        .market-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            z-index: 100;
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            visibility: hidden;
            transition: 0.4s;
            backdrop-filter: blur(8px);
        }

        .market-overlay.active {
            opacity: 1;
            visibility: visible;
        }

        .market-content {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            width: 350px;
            border-radius: 20px;
            padding: 30px;
            text-align: center;
            transform: translateY(20px);
            transition: 0.4s;
        }

        .market-overlay.active .market-content {
            transform: translateY(0);
        }

        h2 { 
            margin-top: 0; 
            letter-spacing: 3px; 
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding-bottom: 15px;
        }

        /* Market Ürünleri */
        .item {
            background: rgba(255, 255, 255, 0.03);
            margin: 15px 0;
            padding: 15px;
            border-radius: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid transparent;
            transition: 0.3s;
        }

        .item:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(255, 255, 255, 0.2);
        }

        .item-name { font-weight: bold; font-size: 1.1rem; color: #00d4ff; }
        .item-price { color: #50ff7e; font-weight: bold; }

        .close-btn {
            margin-top: 20px;
            background: none;
            border: 1px solid rgba(255,255,255,0.3);
            color: white;
            padding: 8px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 0.9rem;
        }

        .close-btn:hover { background: rgba(255,255,255,0.1); }
    </style>
</head>
<body>

    <button class="kk-button" id="openBtn">PROFILE</button>

    <div class="market-overlay" id="marketOverlay">
        <div class="market-content">
            <h2>MARKET</h2>
            
            <div class="item">
                <span class="item-name">VIP</span>
                <span class="item-price">25 TL</span>
            </div>

            <div class="item">
                <span class="item-name">P.VIP</span>
                <span class="item-price">35 TL</span>
            </div>

            <button class="close-btn" id="closeBtn">Kapat</button>
        </div>
    </div>

    <script>
        const openBtn = document.getElementById('openBtn');
        const closeBtn = document.getElementById('closeBtn');
        const overlay = document.getElementById('marketOverlay');

        openBtn.onclick = () => overlay.classList.add('active');
        closeBtn.onclick = () => overlay.classList.remove('active');
        window.onclick = (e) => { if(e.target == overlay) overlay.classList.remove('active'); }

        function createSnow() {
            const s = document.createElement('div');
            s.className = 'snow';
            s.style.left = Math.random() * 100 + 'vw';
            s.style.width = s.style.height = Math.random() * 4 + 2 + 'px';
            s.style.opacity = Math.random();
            s.style.animationDuration = Math.random() * 3 + 4 + 's';
            document.body.appendChild(s);
            setTimeout(() => s.remove(), 7000);
        }
        setInterval(createSnow, 100);
    </script>
</body>
</html>
