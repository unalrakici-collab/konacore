<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Konacore - Market & Video & Müzik</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: radial-gradient(circle at center, #0a0a12 0%, #020205 100%);
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-family: 'Poppins', sans-serif;
            overflow: hidden;
            color: white;
            gap: 20px;
        }

        .snow {
            position: fixed;
            top: -10px;
            background: white;
            border-radius: 50%;
            z-index: 1;
            pointer-events: none;
            animation: fall linear forwards;
        }

        @keyframes fall { to { transform: translateY(105vh); } }

        .kk-button {
            z-index: 10;
            padding: 18px 45px;
            font-size: 1.3rem;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: white;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 12px;
            cursor: pointer;
            backdrop-filter: blur(10px);
            transition: 0.3s;
            width: 300px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        .kk-button:hover {
            background: rgba(255, 255, 255, 0.12);
            transform: scale(1.05);
            border-color: #00d4ff;
        }

        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.92);
            z-index: 100;
            display: none;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(20px);
        }

        .content-box {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            width: 90%;
            max-width: 450px;
            border-radius: 20px;
            padding: 30px;
            text-align: center;
        }

        .item {
            background: rgba(255, 255, 255, 0.03);
            margin: 10px 0;
            padding: 15px;
            border-radius: 12px;
            display: flex;
            justify-content: space-between;
        }

        video {
            width: 100%;
            border-radius: 12px;
            background: black;
        }

        .close-btn {
            margin-top: 20px;
            background: #ff4757;
            border: none;
            color: white;
            padding: 10px 25px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
        }

        /* Müzik Kontrol Butonu (Sağ Alt) */
        .music-control {
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 1000;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            padding: 10px;
            border-radius: 50%;
            cursor: pointer;
        }
    </style>
</head>
<body onclick="startAmbiance()">

    <audio id="bgMusic" loop>
        <source src="rayxveashabparmakseksi.mp3" type="audio/mpeg">
    </audio>
    
    <audio id="waterAmbience" loop>
        <source src="https://www.soundjay.com/nature/sounds/river-1.mp3" type="audio/mpeg">
    </audio>

    <button class="kk-button" onclick="toggle('market')">MARKET</button>
    <button class="kk-button" onclick="toggle('video')">VİDEO İZLE</button>

    <div class="overlay" id="marketOverlay">
        <div class="content-box">
            <h2>MARKET</h2>
            <div class="item"><span>VIP</span><span style="color:#50ff7e">25 TL</span></div>
            <div class="item"><span>P.VIP</span><span style="color:#50ff7e">35 TL</span></div>
            <button class="close-btn" onclick="toggle('market')">KAPAT</button>
        </div>
    </div>

    <div class="overlay" id="videoOverlay">
        <div class="content-box">
            <h2>VİDEO</h2>
            <video id="myVideo" controls>
                <source src="videoplayback.mp4" type="video/mp4">
            </video>
            <button class="close-btn" onclick="toggle('video')">KAPAT</button>
        </div>
    </div>

    <script>
        let ambianceStarted = false;

        function startAmbiance() {
            if (!ambianceStarted) {
                const music = document.getElementById('bgMusic');
                const water = document.getElementById('waterAmbience');
                
                music.volume = 0.4; // Şarkı sesi
                water.volume = 0.2; // Arka plan su sesi daha kısık
                
                music.play();
                water.play();
                ambianceStarted = true;
            }
        }

        function toggle(type) {
            const overlay = document.getElementById(type + 'Overlay');
            const video = document.getElementById('myVideo');
            const music = document.getElementById('bgMusic');

            if (overlay.style.display === 'flex') {
                overlay.style.display = 'none';
                if(type === 'video') {
                    video.pause();
                    music.play(); // Video kapanınca müzik devam etsin
                }
            } else {
                overlay.style.display = 'flex';
                if(type === 'video') {
                    music.pause(); // Video açılınca müzik sussun
                    video.play();
                }
            }
        }

        function createSnow() {
            const s = document.createElement('div');
            s.className = 'snow';
            s.style.left = Math.random() * 100 + 'vw';
            s.style.width = s.style.height = Math.random() * 4 + 2 + 'px';
            s.style.opacity = Math.random();
            s.style.animationDuration = Math.random() * 3 + 4 + 's';
            document.body.appendChild(s);
            setTimeout(() => s.remove(), 7000);
        }
        setInterval(createSnow, 100);
    </script>
</body>
</html>
