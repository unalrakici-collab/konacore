<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Konacore</title>
    <style>
        body { margin: 0; background: #020205; overflow: hidden; font-family: 'Poppins', sans-serif; color: white; }
        
        /* GİRİŞ EKRANI */
        #entry-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: black; z-index: 9999; display: flex;
            justify-content: center; align-items: center; cursor: pointer;
        }
        #entry-overlay h1 { font-size: 1.5rem; letter-spacing: 5px; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { opacity: 0.5; } 50% { opacity: 1; } 100% { opacity: 0.5; } }

        /* ANA SİTE İÇERİĞİ */
        .main-container {
            height: 100vh; display: flex; flex-direction: column;
            justify-content: center; align-items: center; gap: 20px;
            background: radial-gradient(circle at center, #0a0a12 0%, #020205 100%);
        }

        .snow { position: fixed; top: -10px; background: white; border-radius: 50%; z-index: 1; pointer-events: none; animation: fall linear forwards; }
        @keyframes fall { to { transform: translateY(105vh); } }

        .kk-button {
            z-index: 10; padding: 18px 45px; font-size: 1.3rem; font-weight: bold;
            text-transform: uppercase; color: white; background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.2); border-radius: 12px; cursor: pointer; backdrop-filter: blur(10px); width: 300px;
            transition: 0.3s;
        }
        .kk-button:hover { background: rgba(255, 255, 255, 0.1); border-color: #00d4ff; transform: scale(1.05); }

        /* VİDEO PANELİ (MODAL) */
        .overlay { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0, 0, 0, 0.95); z-index: 100; 
            display: none; justify-content: center; align-items: center; 
            backdrop-filter: blur(25px); 
        }

        .content-box { 
            background: rgba(255, 255, 255, 0.03); 
            border: 1px solid rgba(255, 255, 255, 0.1); 
            width: 90%; max-width: 600px; 
            border-radius: 20px; padding: 40px 20px 20px 20px; 
            text-align: center; position: relative;
            box-shadow: 0 0 50px rgba(0,0,0,0.5);
        }

        /* Sağ Üst Çıkış Tusu (X) */
        .exit-x {
            position: absolute; top: 10px; right: 20px;
            font-size: 2rem; color: rgba(255,255,255,0.5);
            cursor: pointer; transition: 0.3s;
        }
        .exit-x:hover { color: #ff4757; }

        video { width: 100%; border-radius: 10px; border: 1px solid rgba(255,255,255,0.1); }

        .close-btn { 
            margin-top: 20px; background: rgba(255, 71, 87, 0.8); 
            border: none; color: white; padding: 12px 35px; 
            border-radius: 8px; cursor: pointer; font-weight: bold; 
            transition: 0.3s; text-transform: uppercase;
        }
        .close-btn:hover { background: #ff4757; transform: translateY(-2px); }
    </style>
</head>
<body>

    <div id="entry-overlay" onclick="enterSite()">
        <h1>GİRMEK İÇİN TIKLA</h1>
    </div>

    <div class="main-container">
        <audio id="bgMusic" loop>
            <source src="rayxveashabparmakseksi.mp3" type="audio/mpeg">
        </audio>
        <audio id="waterSound" loop>
            <source src="https://www.soundjay.com/nature/sounds/river-1.mp3" type="audio/mpeg">
        </audio>

        <button class="kk-button" onclick="toggleVideo(true)">VİDEO İZLE</button>

        <div class="overlay" id="videoOverlay" onclick="handleOutsideClick(event)">
            <div class="content-box">
                <span class="exit-x" onclick="toggleVideo(false)">&times;</span>
                <h2 style="margin-top:0; font-size: 1rem; opacity: 0.7;">VİDEO OYNATILIYOR</h2>
                <video id="myVideo" controls>
                    <source src="videoplayback.mp4" type="video/mp4">
                </video>
                <br>
                <button class="close-btn" onclick="toggleVideo(false)">Kapat / Çıkış</button>
            </div>
        </div>
    </div>

    <script>
        function enterSite() {
            document.getElementById('entry-overlay').style.display = 'none';
            const music = document.getElementById('bgMusic');
            const water = document.getElementById('waterSound');
            music.volume = 0.5;
            water.volume = 0.2;
            music.play();
            water.play();
        }

        function toggleVideo(show) {
            const overlay = document.getElementById('videoOverlay');
            const video = document.getElementById('myVideo');
            const music = document.getElementById('bgMusic');

            if (show) {
                overlay.style.display = 'flex';
                music.pause();
                video.play();
            } else {
                overlay.style.display = 'none';
                video.pause();
                music.play();
            }
        }

        // Dışarıya tıklayınca kapatma
        function handleOutsideClick(e) {
            if (e.target.id === 'videoOverlay') {
                toggleVideo(false);
            }
        }

        // Kar Yağışı
        setInterval(() => {
            const s = document.createElement('div');
            s.className = 'snow';
            s.style.left = Math.random() * 100 + 'vw';
            s.style.width = s.style.height = Math.random() * 4 + 2 + 'px';
            s.style.opacity = Math.random();
            s.style.animationDuration = Math.random() * 3 + 4 + 's';
            document.body.appendChild(s);
            setTimeout(() => s.remove(), 7000);
        }, 100);
    </script>
</body>
</html>
