<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tanıtım Sayfası | Kar Efekti</title>
    <style>
        /* Genel Stil */
        body {
            margin: 0;
            padding: 0;
            background-color: #000; /* Siyah Arka Plan */
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden; /* Kar tanelerinin taşmasını önler */
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        /* İçerik Alanı */
        .container {
            text-align: center;
            z-index: 10; /* Karın üstünde kalması için */
            background: rgba(0, 0, 0, 0.6);
            padding: 40px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(5px);
        }

        h1 {
            font-size: 3rem;
            margin-bottom: 10px;
            letter-spacing: 2px;
        }

        p {
            font-size: 1.2rem;
            color: #ccc;
        }

        .btn {
            display: inline-block;
            margin-top: 20px;
            padding: 12px 30px;
            color: black;
            background-color: white;
            text-decoration: none;
            border-radius: 50px;
            font-weight: bold;
            transition: 0.3s;
        }

        .btn:hover {
            transform: scale(1.1);
            background-color: #ddd;
        }

        /* Kar Taneleri Stili */
        .snowflake {
            position: fixed;
            top: -10px;
            color: white;
            user-select: none;
            z-index: 1;
            pointer-events: none;
            animation: fall linear forwards;
        }

        @keyframes fall {
            to {
                transform: translateY(105vh);
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Türkansite</h1>
        <p>Geleceğin teknolojisiyle tanışın. Şıklık ve sadelik bir arada.</p>
        <a href="#" class="btn">Daha Fazla Bilgi</a>
    </div>

    <script>
        function createSnowflake() {
            const snowflake = document.createElement('div');
            snowflake.innerHTML = '❄'; // Kar karakteri
            snowflake.classList.add('snowflake');
            
            // Rastgele özellikler
            const size = Math.random() * 15 + 10 + 'px';
            const left = Math.random() * 100 + 'vw';
            const duration = Math.random() * 3 + 2 + 's'; // 2-5 saniye arası düşüş
            const opacity = Math.random();

            snowflake.style.fontSize = size;
            snowflake.style.left = left;
            snowflake.style.animationDuration = duration;
            snowflake.style.opacity = opacity;

            document.body.appendChild(snowflake);

            // Ekran dışına çıkınca temizle
            setTimeout(() => {
                snowflake.remove();
            }, 5000);
        }

        // Kar yağışını başlat
        setInterval(createSnowflake, 100);
    </script>

</body>
</html>
